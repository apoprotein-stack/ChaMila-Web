<span att="0">名称</span><span att="1">： </span>部署 Vite 到 Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

 - 名称： 安装依赖
        # 強制在根目錄安裝所有依賴，包含 vite
 运行： NPM 安装

 - 名称： Build with Vite（与 Vite 共建）
        # 執行編譯，這會根據 vite.config.ts 產出 dist 資料夾
 运行： NPM 运行构建

 - 名称： 上传文物
        uses: actions/upload-pages-artifact@v3
        with:
          # 務必與 vite.config.ts 中的 outDir 保持一致
          path: ./dist

 - 名称： 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
