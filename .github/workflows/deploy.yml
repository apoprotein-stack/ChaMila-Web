name: 部署 Vite 到 Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          # 【關鍵點 1】告訴 Actions 去哪裡找 lock 檔以進行快取
          cache-dependency-path: ./client/package-lock.json

      - name: Install & Build
        # 【關鍵點 2】指定在 client 目錄下執行 npm 指令
        working-directory: ./client
        run: |
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 【關鍵點 3】上傳編譯後的結果，路徑也要補上 client/
          path: ./client/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
