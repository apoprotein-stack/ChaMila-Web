name: 部署 Vite 到 Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install & Build
        # 確保指令是標準的 npm 命令
        run: |
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 根據 Vite 預設，成品會在 dist 目錄
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
