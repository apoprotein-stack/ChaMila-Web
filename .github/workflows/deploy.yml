名称： 部署 Vite 到 Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install & Build
        # 直接在根目錄執行，因為我們在 config 裡已經指定 root 是 client 了
        run: |
  NPM 安装
  NPM 运行构建

 - 名称： 上传文物
        uses: actions/upload-pages-artifact@v3
        with:
          # 根據上面的 config，成品會在根目錄的 dist
          path: ./dist

 - 名称： 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
